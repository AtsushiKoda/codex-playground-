<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Hierarchy Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>アクセス統計</h1>
        <div id="flowBars" class="flow-bars"></div>
        <table>
          <thead>
            <tr>
              <th>ノード</th>
              <th>アクセス量</th>
              <th>ミス率</th>
            </tr>
          </thead>
          <tbody id="resultRows"></tbody>
        </table>
      </section>

      <section id="hardwareMap" class="panel">
        <h2>Hardware Map</h2>
        <svg viewBox="0 0 700 380" role="img" aria-label="CPU/Memory/Storage map">
          <rect class="frame" x="20" y="20" width="450" height="330" rx="14" />
          <text x="40" y="50" class="label">CPU Die</text>

          <rect class="node" data-node="core" x="50" y="75" width="120" height="70" rx="8" />
          <text x="88" y="118" class="node-label">Core</text>

          <rect class="node" data-node="l1" x="190" y="75" width="90" height="70" rx="8" />
          <text x="224" y="118" class="node-label">L1</text>

          <rect class="node" data-node="l2" x="295" y="75" width="90" height="70" rx="8" />
          <text x="329" y="118" class="node-label">L2</text>

          <rect class="node" data-node="l3" x="400" y="75" width="90" height="70" rx="8" />
          <text x="433" y="118" class="node-label">L3</text>

          <line class="bus" x1="110" y1="175" x2="450" y2="175" />

          <rect class="node" data-node="dram" x="140" y="205" width="210" height="70" rx="8" />
          <text x="224" y="248" class="node-label">DRAM</text>

          <rect class="node" data-node="ssd" x="510" y="220" width="150" height="85" rx="8" />
          <text x="568" y="270" class="node-label">SSD</text>

          <line class="bus" x1="350" y1="240" x2="510" y2="262" />
        </svg>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
